name: Build ESP32-S3 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ESP32-S3 Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup/toolchains/esp
          key: ${{ runner.os }}-cargo-esp-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-esp-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-esp32s3-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-target-esp32s3-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libuv1-dev \
            libssl-dev \
            pkg-config \
            build-essential \
            curl \
            git \
            python3 \
            python3-pip

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install espup
        run: cargo install espup --locked

      - name: Install ESP Rust toolchain
        run: |
          espup install --targets esp32s3
          echo "source $HOME/export-esp.sh" >> $GITHUB_ENV

      - name: Source ESP environment
        run: |
          cat $HOME/export-esp.sh >> $GITHUB_ENV
          source $HOME/export-esp.sh

      - name: Install ldproxy
        run: cargo install ldproxy --locked

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Show toolchain info
        run: |
          source $HOME/export-esp.sh
          rustup show
          rustc --version
          cargo --version

      - name: Build firmware (release)
        run: |
          source $HOME/export-esp.sh
          cargo build --release

      - name: Generate binary image
        run: |
          source $HOME/export-esp.sh
          espflash save-image \
            --chip esp32s3 \
            target/xtensa-esp32s3-none-elf/release/esp32-s3-super-mini-rhai \
            firmware-esp32s3.bin

      - name: Show binary size
        run: |
          ls -lh firmware-esp32s3.bin
          ls -lh target/xtensa-esp32s3-none-elf/release/esp32-s3-super-mini-rhai

      - name: Upload ELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-firmware-elf
          path: target/xtensa-esp32s3-none-elf/release/esp32-s3-super-mini-rhai
          if-no-files-found: error

      - name: Upload BIN artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-firmware-bin
          path: firmware-esp32s3.bin
          if-no-files-found: error

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware-esp32s3.bin
            target/xtensa-esp32s3-none-elf/release/esp32-s3-super-mini-rhai
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
